    <script>
        // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
        // This happens when polyfills (like formdata-polyfill) try to override window.fetch via a 'global' or 'globalThis' alias.
        (function() {
            const proxy = new Proxy(window, {
                set(target, prop, value) {
                    if (prop === 'fetch') {
                        console.warn('Blocked attempt to override read-only fetch');
                        return true; // Ignore attempts to override fetch
                    }
                    target[prop] = value;
                    return true;
                },
                get(target, prop) {
                    if (prop === 'global' || prop === 'globalThis') return proxy;
                    const value = target[prop];
                    if (typeof value === 'function') return value.bind(target);
                    return value;
                }
            });
            window.global = proxy;
            // Note: We can't redefine globalThis directly in JS, but we can use Vite's 'define' to replace it in the bundle.
        })();
    </script>
